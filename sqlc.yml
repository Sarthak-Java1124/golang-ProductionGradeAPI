version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/adapter/postgres/sqlc"
    schema: "./internal/adapter/postgres/migrations" 
    gen:
      go:
        package: "repo"
        out: "./internal/adapter/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true